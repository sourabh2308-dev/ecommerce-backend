# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║  API GATEWAY — application.properties                                       ║
# ║                                                                             ║
# ║  Central configuration for the Spring Cloud Gateway service.                ║
# ║  In production, many of these values are overridden by the Config Server    ║
# ║  (config-server) or environment variables set in docker-compose.yml.        ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# ─── Application Identity ────────────────────────────────────────────────────
# Service name registered with Eureka and used in distributed tracing spans.
spring.application.name=api-gateway

# Port the embedded Netty server listens on inside the container.
server.port=8080

# ─── Gateway Route Definitions ───────────────────────────────────────────────
# Each route maps an incoming path prefix to a downstream microservice.
# The URIs below use direct HTTP hostnames (Docker Compose service names).
# In production the Config Server overrides these with lb:// URIs so that
# requests are load-balanced through Eureka service discovery.

# Auth Service — handles login, token refresh, and password reset.
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://auth-service:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# User Service — manages registration, OTP verification, and user profiles.
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=http://user-service:8080
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/user/**

# Product Service — product catalogue CRUD and inventory management.
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=http://product-service:8080
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/product/**

# Order Service — order placement, status tracking, and history.
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=http://order-service:8080
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/order/**

# Review Service — product reviews and ratings.
spring.cloud.gateway.routes[4].id=review-service
spring.cloud.gateway.routes[4].uri=http://review-service:8080
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/review/**

# Payment Service — payment processing and transaction records.
spring.cloud.gateway.routes[5].id=payment-service
spring.cloud.gateway.routes[5].uri=http://payment-service:8080
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/payment/**

# ─── Swagger / OpenAPI Aggregation ───────────────────────────────────────────
# The gateway hosts a unified Swagger UI that aggregates the OpenAPI specs
# from every downstream service, giving developers a single place to explore
# and test all APIs.

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config

springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/api/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=user-service
springdoc.swagger-ui.urls[1].url=/api/user/v3/api-docs

springdoc.swagger-ui.urls[2].name=product-service
springdoc.swagger-ui.urls[2].url=/api/product/v3/api-docs

springdoc.swagger-ui.urls[3].name=order-service
springdoc.swagger-ui.urls[3].url=/api/order/v3/api-docs

springdoc.swagger-ui.urls[4].name=review-service
springdoc.swagger-ui.urls[4].url=/api/review/v3/api-docs

springdoc.swagger-ui.urls[5].name=payment-service
springdoc.swagger-ui.urls[5].url=/api/payment/v3/api-docs

# ─── Security ────────────────────────────────────────────────────────────────
# JWT secret — must match the secret used by auth-service to sign tokens.
# In production this is injected via the JWT_SECRET environment variable.
jwt.secret=${JWT_SECRET:mysupersecuresecretkeythatislongenough123}

# Internal secret — attached to every forwarded request so downstream services
# can reject direct external traffic that bypasses the gateway.
internal.secret=${INTERNAL_SECRET:veryStrongInternalSecret123}

# ─── Logging ─────────────────────────────────────────────────────────────────
# Application-level logging at INFO; gateway internals at WARN to reduce noise.
logging.level.com.sourabh.api_gateway=INFO
logging.level.org.springframework.cloud.gateway=WARN

# ─── Redis ───────────────────────────────────────────────────────────────────
# Used by RateLimitGlobalFilter for distributed rate-limit state (future).
# Currently the in-memory ConcurrentHashMap is used; Redis is wired for the
# upgrade path to multi-replica deployments.
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# ─── Config Server Import ───────────────────────────────────────────────────
# Pulls centralised configuration (Eureka settings, management endpoints,
# distributed tracing, and logging patterns) from the Config Server at
# startup. The "optional:" prefix allows the gateway to start even if the
# Config Server is temporarily unavailable.
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
