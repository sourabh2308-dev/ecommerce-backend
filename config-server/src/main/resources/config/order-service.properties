# ── Order Service Configuration ───────────────────────────────────────────────
# Manages order lifecycle: creation, status transitions, tracking,
# returns, coupons, invoices, and seller/admin dashboards.
# ─────────────────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL datasource ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/order_db?currentSchema=public
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ── Redis caching ─────────────────────────────────────────────────────────────
# Caches order lookups; TTL 10 minutes (600 000 ms)
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ── Inter-service communication (Feign) ─────────────────────────────────────
# Calls product-service to validate products and deduct stock on order creation
service.product.url=${PRODUCT_SERVICE_URL:http://product-service:8080}
spring.cloud.openfeign.circuitbreaker.enabled=true

# ── Resilience4j circuit breaker for product-service calls ───────────────────
resilience4j.circuitbreaker.instances.product-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.product-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.product-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.product-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.retry.instances.product-service.max-attempts=3
resilience4j.retry.instances.product-service.wait-duration=1s
resilience4j.timelimiter.instances.product-service.timeout-duration=3s

# ── Kafka ─────────────────────────────────────────────────────────────────────
# Producer: publishes OrderCreatedEvent, OrderStatusChangedEvent
# Consumer: listens for PaymentCompletedEvent from payment-service
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ── OpenAPI ───────────────────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/order/v3/api-docs
springdoc.swagger-ui.enabled=false

logging.level.com.sourabh.order_service=INFO
