# ── User Service Configuration ────────────────────────────────────────────────
# Manages user profiles, addresses, cart, wishlist, notifications,
# loyalty points, support tickets, and seller details.
# ─────────────────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL datasource ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/user_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Redis caching ─────────────────────────────────────────────────────────────
# Caches user profiles and cart data; TTL 15 minutes (900 000 ms)
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=900000
spring.cache.redis.cache-null-values=false

# ── OpenAPI ───────────────────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/user/v3/api-docs
springdoc.swagger-ui.enabled=false

logging.level.com.sourabh.user_service=INFO
