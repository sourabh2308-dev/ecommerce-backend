server.port=8080

# Routes with Eureka load-balanced URIs
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/user/**

spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://product-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/product/**

spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://order-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/order/**

spring.cloud.gateway.routes[4].id=review-service
spring.cloud.gateway.routes[4].uri=lb://review-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/review/**

spring.cloud.gateway.routes[5].id=payment-service
spring.cloud.gateway.routes[5].uri=lb://payment-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/payment/**

# Swagger UI aggregation
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/api/auth/v3/api-docs
springdoc.swagger-ui.urls[1].name=user-service
springdoc.swagger-ui.urls[1].url=/api/user/v3/api-docs
springdoc.swagger-ui.urls[2].name=product-service
springdoc.swagger-ui.urls[2].url=/api/product/v3/api-docs
springdoc.swagger-ui.urls[3].name=order-service
springdoc.swagger-ui.urls[3].url=/api/order/v3/api-docs
springdoc.swagger-ui.urls[4].name=review-service
springdoc.swagger-ui.urls[4].url=/api/review/v3/api-docs
springdoc.swagger-ui.urls[5].name=payment-service
springdoc.swagger-ui.urls[5].url=/api/payment/v3/api-docs

# Rate limiting (Redis)
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# Logging
logging.level.com.sourabh.api_gateway=INFO
logging.level.org.springframework.cloud.gateway=WARN
