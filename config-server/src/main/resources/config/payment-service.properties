# ── Payment Service Configuration ─────────────────────────────────────────────
# Handles payment initiation, Razorpay gateway integration, webhook
# callbacks, seller payout splits, and the Saga-driven auto-payment flow.
# ─────────────────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL datasource ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/payment_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Kafka producer / consumer ────────────────────────────────────────────────
# Consumer: listens for OrderCreatedEvent from order-service
# Producer: publishes PaymentCompletedEvent back to order-service
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=payment-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ── OpenAPI ───────────────────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/payment/v3/api-docs
springdoc.swagger-ui.enabled=false

logging.level.com.sourabh.payment_service=INFO

# ── Razorpay payment gateway ─────────────────────────────────────────────────
# Set to "mock" for local development, "razorpay" for real gateway.
# Credentials are Razorpay Test mode keys (safe for development).
payment.gateway=razorpay
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}
