# ── Auth Service Configuration ────────────────────────────────────────────────
# Handles user authentication: login, signup, JWT token issuance/refresh,
# password reset, and OTP verification.
# ─────────────────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL datasource ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/auth_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Validate schema on startup — tables are created by init.sql / schema.sql
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT token expiration ──────────────────────────────────────────────────────
# Access token:  15 minutes (900 000 ms)
# Refresh token: 7 days    (604 800 000 ms)
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ── Redis ─────────────────────────────────────────────────────────────────────
# Used to store refresh tokens and blacklisted access tokens
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# ── OpenAPI ───────────────────────────────────────────────────────────────────
# Serve API docs JSON at this path; Swagger UI is disabled (handled by gateway)
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/auth/v3/api-docs
springdoc.swagger-ui.enabled=false

logging.level.com.sourabh.auth_service=INFO
