# ── Shared Configuration (all services) ──────────────────────────────────────
# Properties defined here are inherited by every microservice.
# Service-specific files (e.g. auth-service.properties) can override any value.
# ─────────────────────────────────────────────────────────────────────────────

# ── Eureka client registration ───────────────────────────────────────────────
# Every service registers with the Eureka discovery server so other services
# and the API Gateway can locate it by logical name.
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ── Distributed tracing (Zipkin) ─────────────────────────────────────────────
# Sample 100 % of requests so every call chain is traceable in the Zipkin UI
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}

# ── Actuator endpoints ───────────────────────────────────────────────────────
# Expose health, metrics, Prometheus scrape endpoint, and config refresh
management.endpoints.web.exposure.include=health,info,metrics,prometheus,refresh
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ── Logging ──────────────────────────────────────────────────────────────────
# Console pattern includes traceId and spanId for correlation in Zipkin
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId}] [spanId=%X{spanId}] %logger{36} - %msg%n

# ── Security secrets ─────────────────────────────────────────────────────────
# JWT signing key shared by auth-service (issuer) and API Gateway (verifier)
jwt.secret=${JWT_SECRET:mysupersecuresecretkeythatislongenough123}

# Secret used for service-to-service calls bypassing JWT (e.g. internal Feign)
internal.secret=${INTERNAL_SECRET:veryStrongInternalSecret123}
