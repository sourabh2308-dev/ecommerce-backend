# ── Product Service Configuration ─────────────────────────────────────────────
# Manages the product catalog: CRUD, categories, inventory, search,
# and consumes ReviewSubmittedEvent to update average ratings.
# ─────────────────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL datasource ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/product_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Redis caching ─────────────────────────────────────────────────────────────
# Caches product lookups and search results; TTL 10 minutes
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ── Kafka consumer ────────────────────────────────────────────────────────────
# Listens for ReviewSubmittedEvent to recalculate product average rating.
# Explicit default type avoids needing type-info headers on the topic.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=product-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.sourabh.product_service.kafka.event.ReviewSubmittedEvent

# ── OpenAPI ───────────────────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/product/v3/api-docs
springdoc.swagger-ui.enabled=false

logging.level.com.sourabh.product_service=INFO
