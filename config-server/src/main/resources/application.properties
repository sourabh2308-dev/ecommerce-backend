# ── Config Server – Bootstrap Configuration ─────────────────────────────────
# This file configures the Config Server itself (not the downstream services).
# Service-specific configs are in the /config directory.
# ─────────────────────────────────────────────────────────────────────────────

# Service name used for Eureka registration and logging
spring.application.name=config-server

# Standard Spring Cloud Config Server port — all services connect here
server.port=8888

# ── Configuration backend ────────────────────────────────────────────────────
# "native" profile: serve configs from the classpath instead of a Git repo.
# Property files are stored under src/main/resources/config/.
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=classpath:/config

# ── Service discovery ────────────────────────────────────────────────────────
# Register with Eureka so other services can find this server by name
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka}
eureka.instance.prefer-ip-address=true

# ── Actuator endpoints ───────────────────────────────────────────────────────
# Expose health, info, and refresh for monitoring and config reloads
management.endpoints.web.exposure.include=health,info,refresh
management.endpoint.health.show-details=always

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.org.springframework.cloud.config=INFO
