# ──────────────────────────────────────────────────────────────
# review-service — Application Configuration
# ──────────────────────────────────────────────────────────────
# This file configures the review microservice which manages
# product reviews and ratings.  It connects to PostgreSQL for
# persistence, Redis for caching, Kafka for event publishing
# (review.submitted), and the order-service via Feign for
# purchase verification.
# ──────────────────────────────────────────────────────────────

# --- Service identity ---
spring.application.name=review-service
server.port=8080

# --- PostgreSQL datasource ---
# Connects to the review_db database hosted in the shared
# PostgreSQL container.  Credentials are injected via env vars.
spring.datasource.url=jdbc:postgresql://postgres:5432/review_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# --- JPA / Hibernate ---
# "validate" ensures the schema matches entity mappings at boot
# without altering the database.  SQL logging is disabled in
# production; enable spring.jpa.show-sql for debugging.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- Internal service-to-service secret ---
# Shared secret validated by InternalSecretFilter on incoming
# requests and attached to outgoing Feign calls via FeignConfig.
internal.secret=${INTERNAL_SECRET}

# --- Redis (caching layer) ---
# Used by Spring Cache with @Cacheable / @CacheEvict to cache
# product review lists, reducing database load.
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# --- Logging ---
logging.level.com.sourabh.review_service=INFO
logging.level.org.springframework.cache=DEBUG

# --- SpringDoc / OpenAPI ---
# Exposes OpenAPI 3 spec at /api/review/v3/api-docs.
# Swagger UI is disabled; the spec is consumed by the API
# Gateway's aggregated documentation.
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/review/v3/api-docs
springdoc.swagger-ui.enabled=false

# --- Redis cache settings ---
# TTL of 600 000 ms (10 minutes) for cached review lists.
# Null values are not cached to avoid negative-cache issues.
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# --- Feign client — order-service URL ---
# Used by OrderServiceClient to verify purchase history before
# allowing a buyer to submit a review.
service.order.url=${ORDER_SERVICE_URL:http://order-service:8080}

# --- Resilience4j circuit breaker for order-service ---
# Opens the circuit after the failure rate exceeds 50 % in a
# sliding window of the last 10 calls.  Waits 10 s before
# transitioning to half-open (3 trial calls).
spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.order-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.order-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.order-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.order-service.permitted-number-of-calls-in-half-open-state=3

# --- Kafka producer ---
# Publishes ReviewSubmittedEvent to the "review.submitted" topic.
# JSON serialiser ensures events are consumable by product-service.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


# --- Config Server ---
# Loads shared properties (eureka, management, tracing, logging
# pattern) from the centralised Config Server at startup.
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
