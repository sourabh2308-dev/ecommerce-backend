# =============================================================================
# USER-SERVICE APPLICATION CONFIGURATION
# =============================================================================
# Spring Boot configuration for the user-service microservice.
# Environment variables (${VAR:default}) allow per-environment overrides
# without changing this file.  Shared settings (eureka, management, tracing,
# logging patterns) are loaded from the central Config Server.
# =============================================================================

# -----------------------------------------------------------------------------
# Application Identity
# -----------------------------------------------------------------------------
# Registered name used by Eureka, Kafka consumer-group, and log correlation.
spring.application.name=user-service

# HTTP port exposed inside the container (mapped by docker-compose).
server.port=8080

# -----------------------------------------------------------------------------
# PostgreSQL Datasource
# -----------------------------------------------------------------------------
# JDBC connection to the user_db database running in the 'postgres' container.
spring.datasource.url=jdbc:postgresql://postgres:5432/user_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# -----------------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------------
# 'update' strategy auto-creates / alters tables to match entity classes.
# SQL logging is off in production; formatted SQL aids debugging when enabled.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# -----------------------------------------------------------------------------
# Security Secrets
# -----------------------------------------------------------------------------
# JWT signing key — must match the key used by api-gateway so that the
# gateway-injected X-User-Uuid / X-User-Role headers are trustworthy.
jwt.secret=${JWT_SECRET:mysupersecuresecretkeythatislongenough123}

# Shared secret for internal (service-to-service) API calls that bypass
# the public gateway (e.g. order-service fetching user details).
internal.secret=${INTERNAL_SECRET:veryStrongInternalSecret123}

# -----------------------------------------------------------------------------
# Redis Cache
# -----------------------------------------------------------------------------
# Distributed cache backend.  Used by @Cacheable / @CacheEvict annotations
# on user, cart, wishlist looks-ups, etc.
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# Cache type set to Redis; TTL = 900 000 ms (15 minutes).
# Null values are NOT cached to avoid stale negative look-ups.
spring.cache.type=redis
spring.cache.redis.time-to-live=900000
spring.cache.redis.cache-null-values=false

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
# Application-level logging at INFO; Spring cache-abstraction at DEBUG to
# trace cache hits / misses during development.
logging.level.com.sourabh.user_service=INFO
logging.level.org.springframework.cache=DEBUG

# -----------------------------------------------------------------------------
# OpenAPI / Swagger
# -----------------------------------------------------------------------------
# Expose the OpenAPI 3 spec at a service-specific path so the gateway can
# aggregate specs.  The Swagger UI is served by the gateway instead.
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/user/v3/api-docs
springdoc.swagger-ui.enabled=false

# -----------------------------------------------------------------------------
# Flyway (disabled)
# -----------------------------------------------------------------------------
# Schema management is handled by Hibernate ddl-auto; Flyway is not used.
spring.flyway.enabled=false

# -----------------------------------------------------------------------------
# Scheduled Tasks — Loyalty Points Expiry
# -----------------------------------------------------------------------------
# Nightly job (midnight) expires loyalty points older than 365 days.
scheduler.expire-loyalty-points.enabled=true
scheduler.expire-loyalty-points.days=365
scheduler.expire-loyalty-points.cron=0 0 0 * * *

# -----------------------------------------------------------------------------
# Email / SMTP (JavaMail)
# -----------------------------------------------------------------------------
# Gmail SMTP with STARTTLS.  Credentials supplied via environment variables.
# Timeouts prevent the mail thread from blocking indefinitely.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Sender address and display name for outbound transactional emails.
app.mail.from-address=${MAIL_FROM:noreply@ecommerce.com}
app.mail.from-name=${MAIL_FROM_NAME:E-Commerce Platform}

# -----------------------------------------------------------------------------
# Apache Kafka Consumer
# -----------------------------------------------------------------------------
# Consumes order-status-changed events published by order-service.
# JsonDeserializer trusts all packages so event DTOs are deserialised correctly.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# -----------------------------------------------------------------------------
# Config Server Import
# -----------------------------------------------------------------------------
# Loads shared configuration (eureka, actuator, tracing, log patterns) from
# the central Spring Cloud Config Server.  'optional:' prefix allows the
# service to start even if the config server is temporarily unavailable.
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
