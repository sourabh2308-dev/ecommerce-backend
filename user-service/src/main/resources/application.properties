spring.application.name=user-service

server.port=8080

spring.datasource.url=jdbc:postgresql://postgres:5432/user_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT secret must match api-gateway for token header extraction
jwt.secret=${JWT_SECRET:mysupersecuresecretkeythatislongenough123}

internal.secret=${INTERNAL_SECRET:veryStrongInternalSecret123}

# Redis cache configuration
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# Logging
logging.level.com.sourabh.user_service=INFO
logging.level.org.springframework.cache=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n

# Expose API docs at the full prefixed path so the gateway can aggregate them
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/user/v3/api-docs
springdoc.swagger-ui.enabled=false

# Spring cache type
spring.cache.type=redis
spring.cache.redis.time-to-live=900000
spring.cache.redis.cache-null-values=false
# ─── Distributed Tracing (Zipkin) ───────────────────────────────────────────
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
