spring.application.name=user-service
server.port=8080

spring.datasource.url=jdbc:postgresql://postgres:5432/user_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT secret must match api-gateway for token header extraction
jwt.secret=${JWT_SECRET:mysupersecuresecretkeythatislongenough123}

internal.secret=${INTERNAL_SECRET:veryStrongInternalSecret123}

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

logging.level.com.sourabh.user_service=INFO
logging.level.org.springframework.cache=DEBUG

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/user/v3/api-docs
springdoc.swagger-ui.enabled=false

spring.cache.type=redis
spring.cache.redis.time-to-live=900000
spring.cache.redis.cache-null-values=false

# Disable Flyway migrations
spring.flyway.enabled=false

# Scheduled Tasks Configuration
scheduler.expire-loyalty-points.enabled=true
scheduler.expire-loyalty-points.days=365
scheduler.expire-loyalty-points.cron=0 0 0 * * *

# ─── Email / SMTP ─────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from-address=${MAIL_FROM:noreply@ecommerce.com}
app.mail.from-name=${MAIL_FROM_NAME:E-Commerce Platform}

# ─── Kafka ──────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Config Server (loads eureka, management, tracing, logging.pattern — see config-server/config/application.properties)
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
