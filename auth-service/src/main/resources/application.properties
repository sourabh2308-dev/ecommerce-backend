spring.application.name=auth-service
server.port=8080

spring.datasource.url=jdbc:postgresql://postgres:5432/auth_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT secret MUST match the api-gateway's jwt.secret
jwt.secret=${JWT_SECRET:mysupersecuresecretkeythatislongenough123}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

internal.secret=${INTERNAL_SECRET:veryStrongInternalSecret123}

logging.level.com.sourabh.auth_service=INFO

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/auth/v3/api-docs
springdoc.swagger-ui.enabled=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Config Server (loads eureka, management, tracing, logging.pattern — see config-server/config/application.properties)
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
