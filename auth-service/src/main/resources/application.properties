# ──────────────────────────────────────────────────────────────
# Auth Service – Application Configuration
# ──────────────────────────────────────────────────────────────

# ── Service identity ─────────────────────────────────────────
spring.application.name=auth-service
server.port=8080

# ── PostgreSQL datasource ────────────────────────────────────
# Connects to the auth_db database created by init.sql in the
# docker-compose setup.  Credentials default to "postgres" but
# can be overridden via environment variables.
spring.datasource.url=jdbc:postgresql://postgres:5432/auth_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ── JPA / Hibernate ──────────────────────────────────────────
# "validate" ensures the schema matches entity mappings at
# startup without altering the database.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT configuration ────────────────────────────────────────
# The signing secret MUST match the api-gateway's jwt.secret so
# tokens issued here can be validated at the gateway.
jwt.secret=${JWT_SECRET}
# Access-token lifetime: 15 minutes (in milliseconds)
jwt.access-token-expiration=900000
# Refresh-token lifetime: 7 days (in milliseconds)
jwt.refresh-token-expiration=604800000

# ── Internal service-to-service secret ───────────────────────
# Shared secret validated by InternalSecretFilter on inbound
# requests and attached as X-Internal-Secret on outbound calls
# to user-service.
internal.secret=${INTERNAL_SECRET}

# ── Logging ──────────────────────────────────────────────────
logging.level.com.sourabh.auth_service=INFO

# ── SpringDoc / OpenAPI ──────────────────────────────────────
# Exposes API docs at /api/auth/v3/api-docs; Swagger UI is
# disabled (accessed via api-gateway aggregate instead).
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/auth/v3/api-docs
springdoc.swagger-ui.enabled=false

# ── Config Server import ─────────────────────────────────────
# Loads shared properties (eureka, management, tracing, logging
# patterns) from the centralised config-server.
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
