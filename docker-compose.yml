# Shared environment — single source of truth for secrets.
# Override with a .env file or Docker secrets in production.
x-common-env: &common-env
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  JWT_SECRET: mysupersecuresecretkeythatislongenough123
  INTERNAL_SECRET: veryStrongInternalSecret123
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  ZIPKIN_URL: http://zipkin:9411/api/v2/spans
  EUREKA_URL: http://eureka-server:8761/eureka
  CONFIG_SERVER_URL: http://config-server:8888
  REDIS_HOST: redis
  REDIS_PORT: 6379
  ELASTICSEARCH_URIS: http://elasticsearch:9200
  JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:InitialRAMPercentage=5 -XX:MaxRAMPercentage=50 -Djava.security.egd=file:/dev/./urandom
  # ─── SMTP / Email (set real values in .env or override per-service) ───
  MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_FROM: ${MAIL_FROM:-noreply@ecommerce.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-E-Commerce Platform}

# Shared logging configuration to prevent disk space issues
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  postgres:
    image: postgres:15
    mem_limit: 384m
    logging: *default-logging
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    mem_limit: 96m
    logging: *default-logging
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    mem_limit: 768m
    logging: *default-logging
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 40s

  kafka:
    image: apache/kafka:3.7.0
    mem_limit: 512m
    logging: *default-logging
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: -Xms64m -Xmx256m
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  zipkin:
    image: openzipkin/zipkin:3
    mem_limit: 256m
    environment:
      JAVA_OPTS: "-Xms64m -Xmx192m -XX:+UseContainerSupport"
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9411/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  eureka-server:
    build:
      context: .
      dockerfile: ./eureka-server/dockerfile
    logging: *default-logging
    ports:
      - "8761:8761"
    mem_limit: 256m
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  config-server:
    build:
      context: .
      dockerfile: ./config-server/dockerfile
    logging: *default-logging
    ports:
      - "8888:8888"
    environment:
      <<: *common-env
    mem_limit: 256m
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/dockerfile
    logging: *default-logging
    environment:
      <<: *common-env
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: ./user-service/dockerfile
    logging: *default-logging
    environment:
      <<: *common-env
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: ./product-service/dockerfile
    logging: *default-logging
    environment:
      <<: *common-env
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: ./order-service/dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *common-env
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  review-service:
    build:
      context: .
      dockerfile: ./review-service/dockerfile
    logging: *default-logging
    environment:
      <<: *common-env
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: ./payment-service/dockerfile
    logging: *default-logging
    environment:
      <<: *common-env
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/dockerfile
    logging: *default-logging
    ports:
      - "8080:8080"
    mem_limit: 384m
    environment:
      <<: *common-env
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      review-service:
        condition: service_started
      payment-service:
        condition: service_started
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  frontend:
    build: ../ecommerce-frontend
    mem_limit: 192m
    logging: *default-logging
    profiles: ["full"]
    ports:
      - "3001:80"
    depends_on:
      - api-gateway

  prometheus:
    image: prom/prometheus:v2.51.0
    mem_limit: 256m
    logging: *default-logging
    profiles: ["full"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - api-gateway

  grafana:
    image: grafana/grafana:10.4.0
    mem_limit: 256m
    logging: *default-logging
    profiles: ["full"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus


volumes:
  pgdata:
  prometheus_data:
  grafana_data:

