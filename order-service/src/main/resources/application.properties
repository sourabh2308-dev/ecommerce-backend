# =============================================================================
# ORDER SERVICE - Application Configuration
# =============================================================================
# Microservice : order-service
# Framework    : Spring Boot 3.2.5, Java 17
# Description  : Manages the complete order lifecycle including creation, status
#                transitions, payments, returns, invoicing, coupons, shipment
#                tracking, and multi-seller order splitting.
# =============================================================================

# -----------------------------------------------------------------------------
# Server & Application Identity
# -----------------------------------------------------------------------------
spring.application.name=order-service
server.port=8080

# -----------------------------------------------------------------------------
# PostgreSQL Datasource
# -----------------------------------------------------------------------------
# Connects to the "order_db" database on the Docker-internal PostgreSQL host.
# The currentSchema=public query parameter avoids "no schema has been selected"
# errors that can occur with certain Hibernate/JDBC driver combinations.
spring.datasource.url=jdbc:postgresql://postgres:5432/order_db?currentSchema=public
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# -----------------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------------
# "validate" in production ensures the schema matches entity mappings without
# performing DDL changes. Use "update" or a migration tool in dev/test.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.format_sql=true

# -----------------------------------------------------------------------------
# Internal Service-to-Service Authentication Secret
# -----------------------------------------------------------------------------
# Shared secret used to validate requests arriving from other microservices
# (e.g. payment-service callbacks). Override via environment variable in prod.
internal.secret=${INTERNAL_SECRET}

# Durable retry loop for unpublished order-created outbox records.
scheduler.order-created-outbox.fixed-delay-ms=5000

# Apply incremental schema changes for new order-service tables without
# weakening Hibernate's startup validation.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# -----------------------------------------------------------------------------
# Redis Cache
# -----------------------------------------------------------------------------
# Used for caching order lookups (@Cacheable) with a 10-minute TTL.
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging.level.com.sourabh.order_service=INFO
logging.level.org.springframework.cache=DEBUG

# -----------------------------------------------------------------------------
# OpenAPI / SpringDoc
# -----------------------------------------------------------------------------
# Exposes API docs at /api/order/v3/api-docs for the API Gateway to aggregate.
# Swagger UI is disabled because it is served centrally from the gateway.
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/order/v3/api-docs
springdoc.swagger-ui.enabled=false

# -----------------------------------------------------------------------------
# Feign Client - Product Service
# -----------------------------------------------------------------------------
# Base URL for synchronous calls to product-service (stock validation, etc.).
service.product.url=${PRODUCT_SERVICE_URL:http://product-service:8080}

# -----------------------------------------------------------------------------
# Resilience4j Circuit Breaker & Retry (Feign)
# -----------------------------------------------------------------------------
# Protects product-service calls with a sliding-window circuit breaker and
# automatic retries on transient failures.
spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.product-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.product-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.product-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.product-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.retry.instances.product-service.max-attempts=3
resilience4j.retry.instances.product-service.wait-duration=1s

# -----------------------------------------------------------------------------
# Apache Kafka
# -----------------------------------------------------------------------------
# The order-service is both a PRODUCER (publishes "order.created" events consumed
# by payment-service) and a CONSUMER (listens for "payment.completed" events).
#
# Consumer: Uses ErrorHandlingDeserializer to prevent poison-pill messages from
# crashing the listener. The default value type is PaymentCompletedEvent.
#
# Producer: Serialises keys as strings and values as JSON without type headers
# so consumers can deserialise into their own event classes.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.sourabh.order_service.kafka.event.PaymentCompletedEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# -----------------------------------------------------------------------------
# Scheduled Tasks
# -----------------------------------------------------------------------------
# auto-cancel-unpaid-orders : Cancels orders still in PENDING payment status
#                             after the configured number of minutes. Runs every
#                             5 minutes.
# expire-coupons            : Deactivates coupons past their validUntil date.
#                             Runs at the top of every hour.
scheduler.auto-cancel-unpaid-orders.enabled=true
scheduler.auto-cancel-unpaid-orders.minutes=30
scheduler.auto-cancel-unpaid-orders.cron=0 */5 * * * *
scheduler.expire-coupons.enabled=true
scheduler.expire-coupons.cron=0 0 * * * *

# -----------------------------------------------------------------------------
# Spring Cloud Config Server
# -----------------------------------------------------------------------------
# Imports shared configuration (Eureka registration, Actuator endpoints,
# distributed tracing, and log patterns) from the centralised config server.
# "optional:" prefix allows the service to start even if config-server is down.
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
