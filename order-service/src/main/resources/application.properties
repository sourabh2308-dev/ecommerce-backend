spring.application.name=order-service
server.port=8080

spring.datasource.url=jdbc:postgresql://postgres:5432/order_db?currentSchema=public
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# explicit schema selection to avoid "no schema has been selected" errors
spring.jpa.properties.hibernate.default_schema=public
# alternative: add ?currentSchema=public to JDBC URL if needed

spring.jpa.properties.hibernate.format_sql=true

internal.secret=${INTERNAL_SECRET:veryStrongInternalSecret123}

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

logging.level.com.sourabh.order_service=INFO
logging.level.org.springframework.cache=DEBUG

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/order/v3/api-docs
springdoc.swagger-ui.enabled=false

spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Downstream Service URLs (Feign)
service.product.url=${PRODUCT_SERVICE_URL:http://product-service:8080}

# Feign + Resilience4j Circuit Breaker
spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.product-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.product-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.product-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.product-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.retry.instances.product-service.max-attempts=3
resilience4j.retry.instances.product-service.wait-duration=1s

# Kafka (consumer of payment.completed + producer of order.created)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
# Use ErrorHandlingDeserializer to handle deserialization errors gracefully
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.sourabh.order_service.kafka.event.PaymentCompletedEvent
# Producer config
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false


# Scheduled Tasks Configuration
scheduler.auto-cancel-unpaid-orders.enabled=true
scheduler.auto-cancel-unpaid-orders.minutes=30
scheduler.auto-cancel-unpaid-orders.cron=0 */5 * * * *
scheduler.expire-coupons.enabled=true
scheduler.expire-coupons.cron=0 0 * * * *

# Config Server (loads eureka, management, tracing, logging.pattern — see config-server/config/application.properties)
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
