spring.application.name=payment-service
server.port=8080

spring.datasource.url=jdbc:postgresql://postgres:5432/payment_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

internal.secret=${INTERNAL_SECRET:veryStrongInternalSecret123}

logging.level.com.sourabh.payment_service=INFO

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/payment/v3/api-docs
springdoc.swagger-ui.enabled=false

# Kafka (producer: payment.completed | consumer: order.created)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=payment-service
spring.kafka.consumer.auto-offset-reset=earliest
# Use ErrorHandlingDeserializer to handle deserialization errors gracefully
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.sourabh.payment_service.kafka.event.OrderCreatedEvent
spring.kafka.producer.properties.spring.json.add.type.headers=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Config Server (loads eureka, management, tracing, logging.pattern — see config-server/config/application.properties)
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}

# Revenue sharing configuration
payment.platform-fee-percent=${PLATFORM_FEE_PERCENT:10.0}
payment.delivery-fee-per-item=${DELIVERY_FEE_PER_ITEM:30.0}
