spring.application.name=payment-service

server.port=8080

spring.datasource.url=jdbc:postgresql://postgres:5432/payment_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

internal.secret=${INTERNAL_SECRET:veryStrongInternalSecret123}

# Logging
logging.level.com.sourabh.payment_service=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n

# Expose API docs at the full prefixed path so the gateway can aggregate them
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/payment/v3/api-docs
springdoc.swagger-ui.enabled=false
# ─── Kafka (producer: payment.completed) ────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ─── Distributed Tracing (Zipkin) ───────────────────────────────────────────
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
