# ──────────────────────────────────────────────────────────────
# Application identity
# ──────────────────────────────────────────────────────────────
spring.application.name=payment-service
server.port=8080

# ──────────────────────────────────────────────────────────────
# PostgreSQL datasource
# Environment variables DB_USERNAME / DB_PASSWORD override defaults.
# ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://postgres:5432/payment_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ──────────────────────────────────────────────────────────────
# JPA / Hibernate
# ddl-auto=validate ensures the schema matches entities at startup
# without modifying the database (schema.sql or migrations manage DDL).
# ──────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ──────────────────────────────────────────────────────────────
# Internal service-to-service authentication secret
# Shared with other microservices via the INTERNAL_SECRET env var.
# ──────────────────────────────────────────────────────────────
internal.secret=${INTERNAL_SECRET}

# ──────────────────────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────────────────────
logging.level.com.sourabh.payment_service=INFO

# ──────────────────────────────────────────────────────────────
# OpenAPI / Swagger
# Docs are exposed at /api/payment/v3/api-docs.
# Swagger UI is disabled; the API gateway hosts a unified UI.
# ──────────────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/payment/v3/api-docs
springdoc.swagger-ui.enabled=false

# ──────────────────────────────────────────────────────────────
# Kafka
# Producer: publishes to "payment.completed"
# Consumer: subscribes to "order.created"
# ErrorHandlingDeserializer wraps delegates to prevent poison-pill
# messages from killing the consumer.
# ──────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=payment-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.sourabh.payment_service.kafka.event.OrderCreatedEvent
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ──────────────────────────────────────────────────────────────
# Config Server
# Loads shared configuration (eureka, management, tracing,
# logging pattern) from the central config-server.
# ──────────────────────────────────────────────────────────────
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}

# ──────────────────────────────────────────────────────────────
# Revenue sharing configuration
# platform-fee-percent: percentage deducted from each item total
# delivery-fee-per-item: flat fee per unit quantity
# ──────────────────────────────────────────────────────────────
payment.platform-fee-percent=${PLATFORM_FEE_PERCENT:10.0}
payment.delivery-fee-per-item=${DELIVERY_FEE_PER_ITEM:30.0}

# ──────────────────────────────────────────────────────────────
# Payment gateway selection
# "mock" — deterministic in-memory gateway for development
# "razorpay" — Razorpay sandbox / production via REST API
# ──────────────────────────────────────────────────────────────
payment.gateway=${PAYMENT_GATEWAY:mock}

# ──────────────────────────────────────────────────────────────
# Razorpay credentials (test keys for sandbox mode)
# Leave empty when using the mock gateway.
# ──────────────────────────────────────────────────────────────
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}

# ──────────────────────────────────────────────────────────────
# Eureka service discovery
# healthcheck.enabled: use Spring Boot actuator health for status.
# Lease settings control heartbeat and eviction timing.
# ──────────────────────────────────────────────────────────────
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
eureka.client.healthcheck.enabled=true
eureka.instance.leaseRenewalIntervalInSeconds=30
eureka.instance.leaseExpirationDurationInSeconds=90
ribbon.ReadTimeout=5000
ribbon.ConnectTimeout=5000

# ──────────────────────────────────────────────────────────────
# Eureka client tuning
# registry-fetch-interval: how often the client refreshes its
#   local copy of the service registry.
# heartbeat-interval: how often the client sends heartbeats.
# ──────────────────────────────────────────────────────────────
eureka.client.registry-fetch-interval-seconds=30
eureka.client.heartbeat-interval-seconds=10
