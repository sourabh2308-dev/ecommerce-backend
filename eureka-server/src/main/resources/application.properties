# ── Eureka Server Configuration ──────────────────────────────────────────────

# Service name registered with Spring Cloud (used in logs and dashboards)
spring.application.name=eureka-server

# Port on which the Eureka dashboard and registration REST API are served
server.port=8761

# ── Standalone mode ──────────────────────────────────────────────────────────
# This instance is the only Eureka server so it must NOT try to register
# itself or replicate from a peer.
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Skip the default 5-minute wait before the server starts evicting instances
# (useful for faster startup in development)
eureka.server.wait-time-in-ms-when-sync-empty=0

# Hostname advertised to clients inside the Docker network
eureka.instance.hostname=eureka-server

# ── Actuator ─────────────────────────────────────────────────────────────────
# Expose health and info endpoints for container probes and monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ──────────────────────────────────────────────────────────────────
# Reduce noisy Netflix Eureka log output to warnings only
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN
