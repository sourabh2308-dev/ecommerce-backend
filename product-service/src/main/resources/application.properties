# ============================================================================
# PRODUCT SERVICE - Application Configuration
# Spring Boot 3.2.5 | Java 17 | PostgreSQL | Redis | Kafka | Elasticsearch
# ============================================================================

# ----------------------------------------------------------------------------
# Service Identity
# ----------------------------------------------------------------------------
spring.application.name=product-service
server.port=8080

# ----------------------------------------------------------------------------
# PostgreSQL DataSource
# Connects to the product_db database on the Docker-Compose postgres service.
# Credentials are injected via environment variables with local defaults.
# ----------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://postgres:5432/product_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ----------------------------------------------------------------------------
# JPA / Hibernate
# ddl-auto=validate ensures the schema matches entities without auto-altering.
# SQL logging is disabled in production; format_sql aids debugging if enabled.
# ----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------------------------------------------
# Internal Service-to-Service Authentication Secret
# Shared secret used by the API gateway to sign internal forwarded requests.
# ----------------------------------------------------------------------------
internal.secret=${INTERNAL_SECRET:veryStrongInternalSecret123}

# ----------------------------------------------------------------------------
# Redis Configuration
# Used for distributed caching (products cache) and recently-viewed tracking.
# ----------------------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# ----------------------------------------------------------------------------
# Logging Levels
# Application-level INFO; cache operations at DEBUG for troubleshooting.
# ----------------------------------------------------------------------------
logging.level.com.sourabh.product_service=INFO
logging.level.org.springframework.cache=DEBUG

# ----------------------------------------------------------------------------
# SpringDoc / OpenAPI
# Exposes API docs at a custom path; Swagger UI is served via the gateway.
# ----------------------------------------------------------------------------
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/product/v3/api-docs
springdoc.swagger-ui.enabled=false

# ----------------------------------------------------------------------------
# Redis Cache Settings
# TTL of 600 000 ms (10 minutes). Null values are not cached.
# ----------------------------------------------------------------------------
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ----------------------------------------------------------------------------
# Kafka Consumer Configuration
# Listens on the "review.submitted" topic to update product ratings.
# Uses JSON deserialiser with explicit trusted type for ReviewSubmittedEvent.
# ----------------------------------------------------------------------------
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=product-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.sourabh.product_service.kafka.event.ReviewSubmittedEvent

# ----------------------------------------------------------------------------
# Scheduled Tasks
# Cron expression runs every 5 minutes to expire flash deals past their end time.
# ----------------------------------------------------------------------------
scheduler.expire-flash-deals.enabled=true
scheduler.expire-flash-deals.cron=0 */5 * * * *

# ----------------------------------------------------------------------------
# Elasticsearch
# Used for full-text product search. Timeout settings prevent long hangs.
# ----------------------------------------------------------------------------
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://elasticsearch:9200}
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=10s

# ----------------------------------------------------------------------------
# Config Server Import
# Loads shared properties (eureka, management, tracing, logging patterns)
# from the central Spring Cloud Config Server.
# ----------------------------------------------------------------------------
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
