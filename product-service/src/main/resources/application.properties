spring.application.name=product-service
server.port=8080

spring.datasource.url=jdbc:postgresql://postgres:5432/product_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

internal.secret=${INTERNAL_SECRET:veryStrongInternalSecret123}

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

logging.level.com.sourabh.product_service=INFO
logging.level.org.springframework.cache=DEBUG

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api/product/v3/api-docs
springdoc.swagger-ui.enabled=false

spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Kafka (consumer: review.submitted)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=product-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.sourabh.product_service.kafka.event.ReviewSubmittedEvent


# Scheduled Tasks Configuration
scheduler.expire-flash-deals.enabled=true
scheduler.expire-flash-deals.cron=0 */5 * * * *

# Elasticsearch
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://elasticsearch:9200}
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=10s

# Config Server (loads eureka, management, tracing, logging.pattern — see config-server/config/application.properties)
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
