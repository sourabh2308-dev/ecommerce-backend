name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Testcontainers spins up its own PostgreSQL / Kafka containers, so we
      # only need Docker-in-Docker access (provided by ubuntu-latest by default).
      - name: Grant execute permission to Maven wrapper
        run: chmod +x mvnw

      - name: Build and run unit + integration tests
        env:
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: mysupersecuresecretkeythatislongenough123
          INTERNAL_SECRET: veryStrongInternalSecret123
          # Testcontainers manages its own Kafka/PG; these are fallback values.
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          ZIPKIN_URL: http://localhost:9411/api/v2/spans
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw clean verify --batch-mode -Djava.security.egd=file:/dev/./urandom

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/**'
          retention-days: 7

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    # Only run on direct pushes, not PRs, to avoid double builds
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - product-service
          - order-service
          - review-service
          - payment-service
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/dockerfile
          push: false
          tags: ecommerce/${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
